<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>DEIMOS Mission - Extended Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Ці значення будуть перезаписані скриптом initTheme() */
            --accent: #00d4ff;
            --glow: rgba(0, 212, 255, 0.25);
            --correct: #00ff88;
            --wrong: #ff3c3c;
            --bg: #000810;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                linear-gradient(var(--glow) 1px, transparent 1px),
                linear-gradient(90deg, var(--glow) 1px, transparent 1px);
            background-size: 50px 50px;
            overflow: hidden;
        }

        /* Повертаємо скляний стиль */
        .quiz-container {
            width: 850px;
            background: rgba(0, 10, 20, 0.8);
            border: 1px solid var(--accent);
            box-shadow: 0 0 40px var(--glow), inset 0 0 20px var(--glow);
            backdrop-filter: blur(15px);
            padding: 40px;
            position: relative;
            border-radius: 5px;
        }

        /* Ефектні кути */
        .corner {
            position: absolute;
            width: 15px;
            height: 15px;
            border: 2px solid var(--accent);
        }
        .top-l { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
        .top-r { top: -2px; right: -2px; border-left: 0; border-bottom: 0; }
        .bot-l { bottom: -2px; left: -2px; border-right: 0; border-top: 0; }
        .bot-r { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }

        .header {
            font-family: 'Orbitron';
            color: var(--accent);
            text-align: center;
            letter-spacing: 5px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--glow);
            padding-bottom: 15px;
            text-shadow: 0 0 15px var(--accent);
            text-transform: uppercase;
        }

        .question-text {
            font-size: 1.6rem;
            margin-bottom: 30px;
            min-height: 80px;
            line-height: 1.4;
            color: #e0faff;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--accent);
            color: white;
            padding: 18px;
            font-family: 'Rajdhani';
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
            border-radius: 3px;
        }

        .option-btn:hover:not(:disabled) {
            background: var(--glow);
            box-shadow: 0 0 20px var(--glow);
            transform: translateX(10px);
        }

        .correct { background: rgba(0, 255, 136, 0.2) !important; border-color: var(--correct) !important; color: var(--correct); }
        .wrong { background: rgba(255, 60, 60, 0.2) !important; border-color: var(--wrong) !important; color: var(--wrong); }

        .fact-panel {
            margin-top: 30px;
            padding: 20px;
            border-left: 4px solid var(--accent);
            background: rgba(0, 212, 255, 0.05);
            display: none;
            animation: slideIn 0.5s ease forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .next-btn {
            margin-top: 25px;
            width: 100%;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 15px;
            font-family: 'Orbitron';
            font-size: 1.1rem;
            cursor: pointer;
            display: none;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .next-btn:hover { background: var(--accent); color: black; box-shadow: 0 0 30px var(--accent); }

        .footer-info {
            margin-top: 35px;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            opacity: 0.6;
            font-family: 'Orbitron';
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div class="corner top-l"></div><div class="corner top-r"></div>
        <div class="corner bot-l"></div><div class="corner bot-r"></div>

        <div class="header">DEIMOS DATA VERIFICATION</div>

        <div id="quiz-content">
            <div class="question-text" id="question">_</div>
            <div class="options-grid" id="options"></div>

            <div class="fact-panel" id="fact-box">
                <span style="color: var(--accent); font-weight: bold;">[ ANALYSIS ]:</span>
                <p id="fact-text"></p>
            </div>

            <button class="next-btn" id="next-button" onclick="loadNextQuestion()">Next Data Cell</button>
        </div>

        <div class="footer-info">
            <span id="progress">STEP: 1 / 6</span>
            <a href="game.html" style="color: var(--wrong); text-decoration: none;">[ ABORT ]</a>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Яка головна візуальна відмінність Деймоса від Фобоса?", options: ["Має яскраво-червоний колір", "На ньому зовсім немає кратерів", "Поверхня набагато гладкіша через пил", "Має ідеальну кулясту форму"], correct: 2, fact: "На Деймосі шар пилу (реголіту) ховає нерівності кратерів, роблячи його поверхню гладкою." },
            { q: "Яка доля чекає на Деймос у далекому майбутньому?", options: ["Впаде на Марс", "Поступово віддаляється від планети", "Перетвориться на кільце", "Зіткнеться з Сонцем"], correct: 1, fact: "Деймос знаходиться вище критичної позначки і поступово летить геть від Марса." },
            { q: "Скільки часу потрібно Деймосу для одного оберту?", options: ["7 годин", "Приблизно 30 годин", "88 днів", "1 годину"], correct: 1, fact: "Один оберт триває близько 1.26 доби." },
            { q: "Хто офіційно відкрив Деймос у 1877 році?", options: ["Нікола Тесла", "Йоганн Кеплер", "Асаф Голл", "Галілео Галілей"], correct: 2, fact: "Асаф Голл відкрив обидва супутники Марса у серпні 1877 року." },
            { q: "Що означає назва «Деймос»?", options: ["Жах", "Темрява", "Швидкість", "Камінь"], correct: 0, fact: "Деймос перекладається як 'Жах' — вірний супутник бога війни." },
            { q: "Який приблизний діаметр цього супутника?", options: ["Понад 100 км", "Близько 12 км", "1 метр", "3474 км"], correct: 1, fact: "Це один із найдрібніших супутників — його радіус лише 6.2 км." }
        ];

        let currentIdx = 0;

        function initTheme() {
            // ПЕРЕВІРКА ТА ЗАСТОСУВАННЯ ТЕМИ
            const themeColor = localStorage.getItem('marsTheme') || '#00d4ff';
            document.documentElement.style.setProperty('--accent', themeColor);
            
            // Створюємо колір для glow (напівпрозорий)
            const r = parseInt(themeColor.slice(1, 3), 16);
            const g = parseInt(themeColor.slice(3, 5), 16);
            const b = parseInt(themeColor.slice(5, 7), 16);
            document.documentElement.style.setProperty('--glow', `rgba(${r}, ${g}, ${b}, 0.25)`);
        }

        function loadQuestion() {
            const qData = questions[currentIdx];
            
            // Ефект друку тексту
            const qEl = document.getElementById('question');
            qEl.innerText = "";
            let i = 0;
            const typeWriter = () => {
                if (i < qData.q.length) {
                    qEl.innerText += qData.q.charAt(i);
                    i++;
                    setTimeout(typeWriter, 30);
                }
            };
            typeWriter();

            document.getElementById('progress').innerText = `STEP: ${currentIdx + 1} / ${questions.length}`;
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            qData.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index);
                optionsContainer.appendChild(btn);
            });

            document.getElementById('fact-box').style.display = 'none';
            document.getElementById('next-button').style.display = 'none';
        }

        function checkAnswer(selectedIdx) {
            const qData = questions[currentIdx];
            const buttons = document.querySelectorAll('.option-btn');
            
            buttons.forEach((btn, index) => {
                btn.disabled = true;
                if(index === qData.correct) btn.classList.add('correct');
                if(index === selectedIdx && selectedIdx !== qData.correct) btn.classList.add('wrong');
            });

            document.getElementById('fact-text').innerText = qData.fact;
            document.getElementById('fact-box').style.display = 'block';
            document.getElementById('next-button').style.display = 'block';
        }

        function loadNextQuestion() {
            if(currentIdx < questions.length - 1) {
                currentIdx++;
                loadQuestion();
            } else {
                window.location.href = 'game.html';
            }
        }

        initTheme();
        loadQuestion();
    </script>
</body>
</html>
