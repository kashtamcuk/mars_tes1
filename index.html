<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mars OS - Main Terminal v2.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent-color: #ff5722;
            --bg-color-1: #1a0800;
            --glow: rgba(255, 87, 34, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: crosshair;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: #000;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* Анімований фон з частинками */
        #mars-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, var(--bg-color-1) 0%, #000 100%);
            z-index: -1;
        }

        /* Ефект "пилу" */
        .dust {
            position: absolute;
            width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.15;
            animation: drift 60s linear infinite;
        }

        @keyframes drift {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.2) 0px, rgba(0,0,0,0.2) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 100;
        }

        /* Головна панель */
        #main-menu {
            position: relative;
            background: rgba(10, 5, 0, 0.9);
            padding: 80px 120px;
            border: 1px solid var(--accent-color);
            box-shadow: 0 0 40px rgba(0,0,0,1), inset 0 0 30px var(--glow);
            backdrop-filter: blur(10px);
            text-align: center;
            z-index: 10;
        }

        /* Технічні написи по боках */
        .hud-info {
            position: absolute;
            font-family: 'Share Tech Mono';
            font-size: 10px;
            color: var(--accent-color);
            opacity: 0.5;
            text-transform: uppercase;
        }
        .top-left { top: 10px; left: 15px; }
        .top-right { top: 10px; right: 15px; }

        .logo-section h1 {
            font-size: 4.5rem;
            letter-spacing: 20px;
            color: var(--accent-color);
            text-shadow: 0 0 20px var(--accent-color), 2px 2px #000;
            margin-bottom: 5px;
            position: relative;
        }

        /* Ефект дрижання логотипу */
        .logo-section h1::after {
            content: "MARS OS";
            position: absolute;
            left: 0; top: 0; width: 100%;
            opacity: 0.3;
            animation: glitch 4s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            2% { transform: translate(-5px, 2px); color: #00d4ff; }
            4% { transform: translate(5px, -2px); color: #ff0000; }
            6% { transform: translate(0); }
        }

        .logo-section p {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            color: #00d4ff;
            letter-spacing: 10px;
            margin-bottom: 60px;
            opacity: 0.7;
        }

        .nav-buttons {
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
        }

        button {
            font-family: 'Orbitron', sans-serif;
            width: 420px;
            padding: 20px;
            background: rgba(255, 87, 34, 0.03);
            border: 1px solid var(--accent-color);
            color: white;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            font-size: 1.1rem;
            letter-spacing: 5px;
            position: relative;
            overflow: hidden;
        }

        /* Псевдо-елемент для ефекту сканування при наведенні */
        button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        button:hover::before { left: 100%; }

        button:hover {
            background: var(--accent-color);
            color: black;
            box-shadow: 0 0 50px var(--accent-color);
            transform: scale(1.05);
        }

        /* Кутики з анімацією */
        .corner {
            position: absolute;
            width: 30px; height: 30px;
            border: 3px solid var(--accent-color);
            animation: corner-glow 2s infinite;
        }
        @keyframes corner-glow {
            50% { opacity: 0.5; box-shadow: 0 0 15px var(--accent-color); }
        }
        .tl { top: -5px; left: -5px; border-right: none; border-bottom: none; }
        .tr { top: -5px; right: -5px; border-left: none; border-bottom: none; }
        .bl { bottom: -5px; left: -5px; border-right: none; border-top: none; }
        .br { bottom: -5px; right: -5px; border-left: none; border-top: none; }

        .footer-status {
            margin-top: 50px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            color: var(--accent-color);
            display: flex;
            justify-content: space-between;
            padding-top: 20px;
            border-top: 1px solid rgba(255,87,34,0.2);
        }

        .telemetry { color: #00d4ff; }
    </style>
</head>
<body>

    <div id="mars-bg"><div class="dust"></div></div>
    <div class="scanlines" id="fx-layer"></div>

    <main id="main-menu">
        <div class="hud-info top-left">Ares-III // System_Core_v4.2</div>
        <div class="hud-info top-right" id="live-clock">22:04:11</div>

        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>

        <div class="logo-section">
            <h1>MARS OS</h1>
            <p>Ares Settlement Initiative</p>
        </div>

        <nav class="nav-buttons">
            <button onclick="navigate('game.html')">ІНІЦІАЛІЗУВАТИ МІСІЮ</button>
            <button onclick="navigate('settings.html')">КОНФІГУРАЦІЯ СИСТЕМИ</button>
            <button onclick="navigate('mars.html')">АРХІВ ДАНИХ</button>
            <button onclick="navigate('videos.html')">ВІЗУАЛЬНА РОЗВІДКА</button>
        </nav>

        <div class="footer-status">
            <span>COORD: <span class="telemetry" id="coords">18.44°N 77.45°E</span></span>
            <span>TEMP: <span class="telemetry">-63°C</span></span>
            <span class="blink">TERMINAL ACTIVE</span>
        </div>
    </main>

<script>
    const bgMusic = new Audio('fon_menu.mp3');
    bgMusic.loop = true;

    function navigate(url) {
        playClick();
        // Ефект вимикання екрану перед переходом
        document.getElementById('main-menu').style.opacity = '0';
        document.getElementById('main-menu').style.transform = 'scale(0.9)';
        setTimeout(() => window.location.href = url, 400);
    }

    function playClick() {
        const clickSnd = new Audio('click-effect.mp3'); 
        clickSnd.volume = (localStorage.getItem('marsVol') || 70) / 100;
        clickSnd.play().catch(() => {});
    }

    // Оновлення "живих" координат та годинника
    setInterval(() => {
        const time = new Date();
        document.getElementById('live-clock').innerText = time.toLocaleTimeString();
        
        // Випадкова зміна координат для ефекту руху марсохода
        const lat = (18.44 + Math.random() * 0.01).toFixed(2);
        const lon = (77.45 + Math.random() * 0.01).toFixed(2);
        document.getElementById('coords').innerText = `${lat}°N ${lon}°E`;
    }, 1000);

    function applySavedSettings() {
        const theme = localStorage.getItem('marsTheme') || '#ff5722';
        document.documentElement.style.setProperty('--accent-color', theme);
        
        const fx = localStorage.getItem('marsFX') !== 'false';
        document.getElementById('fx-layer').style.display = fx ? 'block' : 'none';
        
        // Колір фону залежно від теми
        const bgMap = {"#ff5722":"#1a0800", "#00d4ff":"#000a1a", "#4caf50":"#051a05", "#e91e63":"#1a0008"};
        document.documentElement.style.setProperty('--bg-color-1', bgMap[theme] || "#000");
    }

    window.onload = applySavedSettings;
    document.addEventListener('click', () => {
        bgMusic.play().catch(() => {});
    }, { once: true });
</script>

</body>
</html>
