<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>PHOBOS Mission - Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00d4ff;
            --correct: #00ff88;
            --wrong: #ff3c3c;
            --bg: #000810;
            --glow: rgba(0, 212, 255, 0.25);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                linear-gradient(var(--glow) 1px, transparent 1px),
                linear-gradient(90deg, var(--glow) 1px, transparent 1px);
            background-size: 50px 50px;
            overflow: hidden;
        }

        /* "Скляний" контейнер із кутами */
        .quiz-container {
            width: 850px;
            background: rgba(0, 5, 10, 0.85);
            border: 1px solid var(--accent);
            box-shadow: 0 0 40px var(--glow), inset 0 0 20px var(--glow);
            backdrop-filter: blur(15px);
            padding: 40px;
            position: relative;
            border-radius: 4px;
        }

        /* Декоративні кути */
        .corner {
            position: absolute;
            width: 15px;
            height: 15px;
            border: 2px solid var(--accent);
        }
        .top-l { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
        .top-r { top: -2px; right: -2px; border-left: 0; border-bottom: 0; }
        .bot-l { bottom: -2px; left: -2px; border-right: 0; border-top: 0; }
        .bot-r { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }

        .header {
            font-family: 'Orbitron';
            color: var(--accent);
            text-align: center;
            letter-spacing: 5px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--glow);
            padding-bottom: 15px;
            text-shadow: 0 0 15px var(--accent);
            text-transform: uppercase;
        }

        .question-text {
            font-size: 1.6rem;
            margin-bottom: 25px;
            min-height: 80px;
            line-height: 1.4;
            color: #e0faff;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--accent);
            color: white;
            padding: 18px;
            font-family: 'Rajdhani';
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            background: var(--glow);
            box-shadow: 0 0 20px var(--glow);
            transform: translateX(10px);
        }

        .option-btn:disabled { cursor: default; }

        .correct { background: rgba(0, 255, 136, 0.2) !important; border-color: var(--correct) !important; color: var(--correct); }
        .wrong { background: rgba(255, 60, 60, 0.2) !important; border-color: var(--wrong) !important; color: var(--wrong); }

        .fact-panel {
            margin-top: 30px;
            padding: 20px;
            border-left: 4px solid var(--accent);
            background: rgba(255, 255, 255, 0.03);
            display: none;
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fact-title {
            font-family: 'Orbitron';
            font-size: 0.8rem;
            color: var(--accent);
            margin-bottom: 8px;
            display: block;
        }

        .next-btn {
            margin-top: 25px;
            width: 100%;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 15px;
            font-family: 'Orbitron';
            font-size: 1.1rem;
            cursor: pointer;
            display: none;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .next-btn:hover { background: var(--accent); color: black; box-shadow: 0 0 30px var(--accent); }

        .footer-info {
            margin-top: 35px;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            opacity: 0.7;
            font-family: 'Orbitron';
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div class="corner top-l"></div><div class="corner top-r"></div>
        <div class="corner bot-l"></div><div class="corner bot-r"></div>

        <div class="header">PHOBOS MISSION DATA CHECK</div>

        <div id="quiz-box">
            <div class="question-text" id="question">_</div>
            
            <div class="options-grid" id="options"></div>

            <div class="fact-panel" id="fact-box">
                <span class="fact-title">DATABASE RECOVERY:</span>
                <p id="fact-text" style="margin: 0; line-height: 1.4;"></p>
            </div>

            <button class="next-btn" id="next-button" onclick="loadNextQuestion()">Execute Next Sequence</button>
        </div>

        <div class="footer-info">
            <span id="progress">STEP: 1 / 4</span>
            <a href="game.html" style="color: var(--wrong); text-decoration: none;">[ ABORT ]</a>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Яке походження Фобоса вважається найбільш імовірним?", options: ["Уламок Землі", "Захоплений астероїд", "Частина Марса", "Згасла комета"], correct: 1, fact: "Склад Фобоса нагадує астероїди головного поясу, що робить теорію 'захоплення' гравітацією Марса пріоритетною." },
            { q: "Яка доля чекає на Фобос через 30-50 млн років?", options: ["Вилетить у космос", "Розпадеться у кільце", "Зіткнеться з Деймосом", "Зупиниться"], correct: 1, fact: "Марс притягує Фобос на 2 метри кожне століття. Врешті-решт припливні сили розірвуть його на кільце уламків." },
            { q: "Як називається найбільший ударний кратер на Фобосі?", options: ["Олімп", "Стікні", "Кассіні", "Марінер"], correct: 1, fact: "Кратер Стікні настільки великий (9 км), що удар ледь не розколов увесь супутник на частини." },
            { q: "За який час Фобос робить повний оберт навколо Марса?", options: ["24 години", "30 днів", "7 годин 39 хвилин", "12 годин"], correct: 2, fact: "Фобос обертається швидше, ніж Марс навколо своєї осі, тому він сходить на заході та сідає на сході." }
        ];

        let currentIdx = 0;

        function initTheme() {
            const themeColor = localStorage.getItem('marsTheme') || '#00d4ff';
            document.documentElement.style.setProperty('--accent', themeColor);
            const r = parseInt(themeColor.slice(1, 3), 16);
            const g = parseInt(themeColor.slice(3, 5), 16);
            const b = parseInt(themeColor.slice(5, 7), 16);
            document.documentElement.style.setProperty('--glow', `rgba(${r}, ${g}, ${b}, 0.25)`);
        }

        function loadQuestion() {
            const qData = questions[currentIdx];
            
            // Ефект друку
            const qEl = document.getElementById('question');
            qEl.innerText = "";
            let i = 0;
            const typeWriter = () => {
                if (i < qData.q.length) {
                    qEl.innerText += qData.q.charAt(i);
                    i++;
                    setTimeout(typeWriter, 35);
                }
            };
            typeWriter();

            document.getElementById('progress').innerText = `STEP: ${currentIdx + 1} / ${questions.length}`;
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            qData.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index);
                optionsContainer.appendChild(btn);
            });

            document.getElementById('fact-box').style.display = 'none';
            document.getElementById('next-button').style.display = 'none';
        }

        function checkAnswer(selectedIdx) {
            const qData = questions[currentIdx];
            const buttons = document.querySelectorAll('.option-btn');
            
            buttons.forEach((btn, index) => {
                btn.disabled = true;
                if(index === qData.correct) btn.classList.add('correct');
                if(index === selectedIdx && selectedIdx !== qData.correct) btn.classList.add('wrong');
            });

            document.getElementById('fact-text').innerText = qData.fact;
            document.getElementById('fact-box').style.display = 'block';
            document.getElementById('next-button').style.display = 'block';
            
            if(currentIdx === questions.length - 1) {
                document.getElementById('next-button').innerText = "FINALIZE PHOBOS DATA";
                document.getElementById('next-button').onclick = () => window.location.href = 'game.html';
            }
        }

        function loadNextQuestion() {
            currentIdx++;
            loadQuestion();
        }

        initTheme();
        loadQuestion();
    </script>

    <audio id="bgMusic" loop><source src="test_voce.mp3" type="audio/mpeg"></audio>
    <div id="music-control" style="position: fixed; top: 20px; right: 20px; cursor: pointer; z-index: 100; opacity: 0.5; font-size: 20px;">
        <span id="music-icon">🔇</span>
    </div>

    <script>
        const music = document.getElementById('bgMusic');
        const musicIcon = document.getElementById('music-icon');
        music.volume = 0.3;

        function startMusic() {
            music.play().then(() => {
                musicIcon.innerText = "🔊";
                document.getElementById('music-control').style.opacity = "1";
            }).catch(() => {});
        }

        window.addEventListener('click', startMusic, { once: true });

        document.getElementById('music-control').onclick = (e) => {
            e.stopPropagation();
            if (music.paused) {
                music.play();
                musicIcon.innerText = "🔊";
            } else {
                music.pause();
                musicIcon.innerText = "🔇";
            }
        };
    </script>
</body>
</html>
