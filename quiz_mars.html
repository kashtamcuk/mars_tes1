<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>MARS Central Mission - Data Check</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff5722;
            --correct: #00ff88;
            --wrong: #ff3c3c;
            --bg: #030000;
            --glow: rgba(255, 87, 34, 0.25);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                linear-gradient(var(--glow) 1px, transparent 1px),
                linear-gradient(90deg, var(--glow) 1px, transparent 1px);
            background-size: 50px 50px;
            overflow: hidden;
        }

        /* Повертаємо скляний стиль з правильним обрізанням */
        .quiz-container {
            width: 850px;
            background: rgba(10, 2, 0, 0.8);
            border: 1px solid var(--accent);
            box-shadow: 0 0 40px var(--glow), inset 0 0 20px var(--glow);
            backdrop-filter: blur(15px);
            padding: 45px;
            position: relative;
            border-radius: 4px;
        }

        /* Декоративні кути */
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent);
        }
        .top-l { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
        .top-r { top: -2px; right: -2px; border-left: 0; border-bottom: 0; }
        .bot-l { bottom: -2px; left: -2px; border-right: 0; border-top: 0; }
        .bot-r { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }

        .header {
            font-family: 'Orbitron';
            color: var(--accent);
            text-align: center;
            letter-spacing: 6px;
            margin-bottom: 35px;
            border-bottom: 1px solid var(--glow);
            padding-bottom: 20px;
            text-shadow: 0 0 20px var(--accent);
            text-transform: uppercase;
        }

        .question-text {
            font-size: 1.6rem;
            margin-bottom: 35px;
            min-height: 90px;
            line-height: 1.4;
            color: #fff0eb;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--accent);
            color: #eee;
            padding: 20px;
            font-family: 'Rajdhani';
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            background: var(--glow);
            box-shadow: 0 0 20px var(--glow);
            transform: translateX(10px);
            color: white;
        }

        .correct { background: rgba(0, 255, 136, 0.15) !important; border-color: var(--correct) !important; color: var(--correct) !important; }
        .wrong { background: rgba(255, 60, 60, 0.15) !important; border-color: var(--wrong) !important; color: var(--wrong) !important; }

        .fact-panel {
            margin-top: 35px;
            padding: 25px;
            border-left: 4px solid var(--accent);
            background: rgba(255, 87, 34, 0.05);
            display: none;
            animation: emerge 0.6s ease forwards;
        }

        @keyframes emerge {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fact-title {
            font-family: 'Orbitron';
            font-size: 0.9rem;
            color: var(--accent);
            margin-bottom: 10px;
            display: block;
            text-transform: uppercase;
        }

        .next-btn {
            margin-top: 30px;
            width: 100%;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 18px;
            font-family: 'Orbitron';
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            display: none;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .next-btn:hover { background: var(--accent); color: black; box-shadow: 0 0 30px var(--accent); }

        .footer {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            font-family: 'Orbitron';
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div class="corner top-l"></div><div class="corner top-r"></div>
        <div class="corner bot-l"></div><div class="corner bot-r"></div>

        <div class="header">MARS PLANETARY DATA INTERFACE</div>

        <div id="quiz">
            <div class="question-text" id="question">Initializing neural link...</div>
            <div class="options-grid" id="options"></div>

            <div class="fact-panel" id="fact-box">
                <span class="fact-title">DATA_RECOVERY // SECTOR_DECRYPTED:</span>
                <p id="fact-text" style="margin: 0; line-height: 1.5;"></p>
            </div>

            <button class="next-btn" id="next-button" onclick="loadNext()">Proceed to Next Sector</button>
        </div>

        <div class="footer">
            <span id="progress">SECTOR: 1 / 10</span>
            <a href="game.html" style="color: var(--wrong); text-decoration: none;">[ ABORT_MISSION ]</a>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Чому Марс називають 'Червоною планетою'?", options: ["Висока температура", "Оксид заліза (іржа) у ґрунті", "Колір атмосфери", "Червона рослинність"], correct: 1, fact: "Поверхня Марса покрита реголітом, багатим на залізо. Через взаємодію з розрідженою атмосферою воно окислюється, як старий метал." },
            { q: "Яка гора на Марсі є найвищим вулканом у Сонячній системі?", options: ["Еверест", "Гора Олімп", "Кратер Стікні", "Вулкан Аскрійський"], correct: 1, fact: "Гора Олімп височіє на 21.2 км. Це настільки масивний об'єкт, що його основа заходить за горизонт через кривизну планети." },
            { q: "Скільки часу триває один рік на Марсі?", options: ["365 днів", "687 земних діб", "100 днів", "2 роки 5 місяців"], correct: 1, fact: "Орбітальний період Марса довший за земний, тому марсіанський рік триває майже вдвічі довше — приблизно 1.88 земного року." },
            { q: "Яка основна складова атмосфери Марса?", options: ["Кисень", "Азот", "Вуглекислий газ (CO2)", "Метан"], correct: 2, fact: "95% атмосфери — це вуглекислий газ. Вона настільки тонка, що не затримує тепло, створюючи екстремальні перепади температур." },
            { q: "Як називається найбільша система каньйонів на Марсі?", options: ["Великий Каньйон", "Долини Марінера", "Рівнина Утопія", "Лабіринт Ночі"], correct: 1, fact: "Долини Марінера мають глибину до 7 км. Це найбільший розлом у корі планети, видимий навіть з космосу." },
            { q: "Чи є на Марсі рідка вода на поверхні зараз?", options: ["Так, океани", "Ні, тільки лід і пара", "Так, у річках", "Ніколи не було"], correct: 1, fact: "Рідка вода на Марсі нестабільна. При поточному тиску вона або випаровується, або перетворюється на лід миттєво." },
            { q: "Яка сила тяжіння на Марсі порівняно із Земною?", options: ["Така сама", "У 10 разів сильніша", "Близько 38% від земної", "Повна невагомість"], correct: 2, fact: "Низька гравітація дозволила б вам стрибати у три рази вище. Це також причина, чому атмосфера Марса така розріджена." },
            { q: "Як називаються пилові бурі на Марсі?", options: ["Торнадо", "Пилові дияволи", "Глобальні бурі", "Всі варіанти"], correct: 3, fact: "Марс — планета екстремальних бур. 'Пилові дияволи' — це локальні смерчі, але існують і глобальні бурі, що закривають усю планету." },
            { q: "Який перший успішний марсохід висадився на планету в 1997 році?", options: ["Curiosity", "Sojourner", "Perseverance", "Spirit"], correct: 1, fact: "Sojourner був маленьким демонстратором технологій, але саме він довів, що мобільні роботи можуть ефективно досліджувати Марс." },
            { q: "Чи має Марс магнітне поле, подібне до Земного?", options: ["Так, потужне", "Ні, майже відсутнє", "Тільки на екваторі", "Тільки синє"], correct: 1, fact: "Відсутність магнітного щита — головна проблема колонізації. Сонце безперешкодно опромінює поверхню радіацією." }
        ];

        let idx = 0;

        function loadTheme() {
            const theme = localStorage.getItem('marsTheme') || '#ff5722';
            document.documentElement.style.setProperty('--accent', theme);
            const r = parseInt(theme.slice(1,3), 16), g = parseInt(theme.slice(3,5), 16), b = parseInt(theme.slice(5,7), 16);
            document.documentElement.style.setProperty('--glow', `rgba(${r},${g},${b}, 0.25)`);
        }

        function loadQuestion() {
            const data = questions[idx];
            
            // Ефект друку
            const qEl = document.getElementById('question');
            qEl.innerText = "";
            let i = 0;
            const typeWriter = () => {
                if (i < data.q.length) {
                    qEl.innerText += data.q.charAt(i);
                    i++;
                    setTimeout(typeWriter, 30);
                }
            };
            typeWriter();

            document.getElementById('progress').innerText = `SECTOR: ${idx + 1} / 10`;
            const container = document.getElementById('options');
            container.innerHTML = '';
            
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => select(index);
                container.appendChild(btn);
            });

            document.getElementById('fact-box').style.display = 'none';
            document.getElementById('next-button').style.display = 'none';
        }

        function select(i) {
            const data = questions[idx];
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach((b, j) => {
                b.disabled = true;
                if(j === data.correct) b.classList.add('correct');
                if(i === j && i !== data.correct) b.classList.add('wrong');
            });
            document.getElementById('fact-text').innerText = data.fact;
            document.getElementById('fact-box').style.display = 'block';
            document.getElementById('next-button').style.display = 'block';

            if(idx === questions.length - 1) {
                document.getElementById('next-button').innerText = "COMPLETE MARS MISSION";
            }
        }

        function loadNext() {
            if(++idx < questions.length) loadQuestion();
            else window.location.href = 'game.html';
        }

        loadTheme();
        loadQuestion();
    </script>

    <audio id="bgMusic" loop><source src="test_voce.mp3" type="audio/mpeg"></audio>
    <div id="music-control" style="position: fixed; top: 20px; right: 20px; cursor: pointer; z-index: 100; opacity: 0.5;">
        <span id="music-icon" style="font-size: 24px;">🔇</span>
    </div>

    <script>
        const music = document.getElementById('bgMusic');
        const musicIcon = document.getElementById('music-icon');
        music.volume = 0.3;

        function startMusic() {
            music.play().then(() => {
                musicIcon.innerText = "🔊";
                document.getElementById('music-control').style.opacity = "1";
            }).catch(() => {});
        }

        window.addEventListener('click', startMusic, { once: true });

        document.getElementById('music-control').onclick = (e) => {
            e.stopPropagation();
            if (music.paused) {
                music.play();
                musicIcon.innerText = "🔊";
            } else {
                music.pause();
                musicIcon.innerText = "🔇";
            }
        };
    </script>
</body>
</html>
