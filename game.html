<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>ARES Navigation Protocol v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00d4ff;
            --exit-color: #ff3c3c;
            --bg: #00050a;
            --glow: rgba(0, 212, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Анімований космос */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3;
            animation: spaceMove 100s linear infinite;
            z-index: -1;
        }

        @keyframes spaceMove {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        .terminal-frame {
            position: relative;
            width: 95vw;
            height: 90vh;
            border: 1px solid var(--accent);
            background: rgba(0, 8, 15, 0.85);
            box-shadow: inset 0 0 50px rgba(0,0,0,1), 0 0 20px var(--glow);
            display: grid;
            grid-template-columns: 250px 1fr 250px;
            grid-template-rows: 60px 1fr 80px;
            backdrop-filter: blur(15px);
            z-index: 10;
            overflow: hidden;
        }

        /* Декоративні орбіти */
        .orbit {
            position: absolute;
            top: 50%; left: 50%;
            border: 1px dashed rgba(255,255,255,0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .orbit-1 { width: 400px; height: 400px; }
        .orbit-2 { width: 650px; height: 650px; }

        .header {
            grid-column: 1 / span 3;
            border-bottom: 1px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            font-family: 'Orbitron';
            color: var(--accent);
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 3px;
        }

        .side-panel {
            padding: 30px;
            border-right: 1px solid rgba(0, 212, 255, 0.1);
            background: rgba(0,0,0,0.3);
        }

        .side-panel.right {
            border-right: none;
            border-left: 1px solid rgba(0, 212, 255, 0.1);
            text-align: right;
        }

        .main-display {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.05) 0%, transparent 70%);
        }

        /* Об'єкти */
        .node {
            position: absolute;
            text-decoration: none;
            color: white;
            z-index: 20;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .dot {
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--accent);
            margin: 0 auto 15px;
        }

        #mars .dot { 
            width: 120px; height: 120px; 
            background: radial-gradient(circle, #ff5722 0%, #330000 100%);
            border: 2px solid var(--accent);
            box-shadow: 0 0 40px rgba(255, 87, 34, 0.5);
        }

        .node .label {
            font-family: 'Share Tech Mono';
            padding: 5px 15px;
            background: rgba(0,0,0,0.9);
            border: 1px solid var(--accent);
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .node:hover { transform: scale(1.2); filter: brightness(1.3); }

        /* Позиції */
        #phobos { top: 20%; left: 25%; }
        #deimos { bottom: 25%; right: 20%; }

        /* Стат-бокси */
        .stat-box { 
            border-left: 3px solid var(--accent);
            padding: 10px 15px;
            background: rgba(255,255,255,0.02);
            margin-bottom: 20px;
            font-family: 'Share Tech Mono';
        }
        .right .stat-box { border-left: none; border-right: 3px solid var(--accent); }

        .footer {
            grid-column: 1 / span 3;
            border-top: 1px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
        }

        .exit-btn {
            color: var(--exit-color);
            text-decoration: none;
            font-family: 'Orbitron';
            font-size: 0.8rem;
            border: 1px solid var(--exit-color);
            padding: 10px 30px;
            transition: 0.3s;
        }
        .exit-btn:hover { background: var(--exit-color); color: black; box-shadow: 0 0 20px var(--exit-color); }

        .blink { animation: pulse 1s infinite; color: var(--exit-color); }
        @keyframes pulse { 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="terminal-frame">
        <div class="header">
            <span>ARES-CORE // NAV_UNIT_01</span>
            <span id="os-clock">00:00:00</span>
        </div>

        <div class="side-panel">
            <div class="stat-box">
                <div style="font-size: 0.6rem; opacity: 0.5;">STATUS:</div>
                <div style="color: #4caf50;">ONLINE / STABLE</div>
            </div>
            <div class="stat-box">
                <div style="font-size: 0.6rem; opacity: 0.5;">OXYGEN_LVL:</div>
                <div>98.2% <span style="font-size: 0.7rem; color: #4caf50;">[OK]</span></div>
            </div>
            <div class="stat-box">
                <div style="font-size: 0.6rem; opacity: 0.5;">ENERGY:</div>
                <div style="color: #ffeb3b;">74.002 kW</div>
            </div>
        </div>

        <div class="main-display">
            <div class="orbit orbit-1"></div>
            <div class="orbit orbit-2"></div>

            <a href="quiz_phobos.html" class="node" id="phobos">
                <div class="dot" style="width: 20px; height: 20px;"></div>
                <div class="label">SEC: PHOBOS_MN-1</div>
            </a>

            <a href="quiz_deimos.html" class="node" id="deimos">
                <div class="dot" style="width: 15px; height: 15px;"></div>
                <div class="label">SEC: DEIMOS_MN-2</div>
            </a>

            <a href="quiz_mars.html" class="node" id="mars">
                <div class="dot"></div>
                <div class="label" style="font-size: 1rem; color: #ff5722; border-color: #ff5722;">PRIMARY: MARS_BASE</div>
            </a>
        </div>

        <div class="side-panel right">
            <div class="stat-box">
                <div style="font-size: 0.6rem; opacity: 0.5;">GRAVITY:</div>
                <div>3.721 m/s²</div>
            </div>
            <div class="stat-box">
                <div style="font-size: 0.6rem; opacity: 0.5;">RADIATION:</div>
                <div class="blink">CRITICAL_LEVEL</div>
            </div>
            <div style="margin-top: auto; font-family: 'Share Tech Mono'; font-size: 0.7rem; color: var(--accent);">
                SCANNING_DATA_...<br>77% COMPLETE
            </div>
        </div>

        <div class="footer">
            <div style="font-family: 'Share Tech Mono'; font-size: 0.7rem;">LOG: SHIP_STATIONARY // WAITING_FOR_COMMAND</div>
            <a href="index.html" class="exit-btn">RETURN TO BASE</a>
            <div id="music-control" style="cursor: pointer; font-size: 1.2rem;">🔊</div>
        </div>
    </div>

    <audio id="bgMusic" loop src="game_voce.mp3"></audio>

    <script>
        function updateTheme() {
            const themeColor = localStorage.getItem('marsTheme') || '#00d4ff';
            document.documentElement.style.setProperty('--accent', themeColor);
            
            const r = parseInt(themeColor.slice(1, 3), 16);
            const g = parseInt(themeColor.slice(3, 5), 16);
            const b = parseInt(themeColor.slice(5, 7), 16);
            document.documentElement.style.setProperty('--glow', `rgba(${r}, ${g}, ${b}, 0.25)`);
        }

        function updateClock() {
            document.getElementById('os-clock').innerText = new Date().toLocaleTimeString();
        }

        const music = document.getElementById('bgMusic');
        const mCtrl = document.getElementById('music-control');
        
        mCtrl.onclick = () => {
            if (music.paused) {
                music.play();
                mCtrl.innerText = "🔊";
            } else {
                music.pause();
                mCtrl.innerText = "🔇";
            }
        };

        window.onload = () => {
            updateTheme();
            setInterval(updateClock, 1000);
            updateClock();
            
            document.querySelectorAll('.node, .exit-btn').forEach(btn => {
                btn.onmouseenter = () => {
                    const s = new Audio('click-effect.mp3');
                    s.volume = 0.2;
                    s.play().catch(()=>{});
                }
            });
        };

        document.addEventListener('click', () => {
            if (music.paused) {
                music.volume = 0.3;
                music.play().catch(()=>{});
            }
        }, { once: true });

        window.addEventListener('storage', updateTheme);
    </script>
</body>
</html>
